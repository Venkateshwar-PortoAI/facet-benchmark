<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" role="img" aria-label="FACET — Measuring Attribution Faithfulness in Multi-Factor LLM Reasoning">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .border { fill: none; stroke: #d0d7de; stroke-width: 1; }
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 800; font-size: 56px; fill: #0d1117; letter-spacing: -0.03em; }
      .tagline { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 400; font-size: 24px; fill: #57606a; }
      .sep { stroke: #d0d7de; stroke-width: 1.5; stroke-linecap: round; }
      .icon-stroke { fill: none; stroke: #0d1117; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .factor-dot { fill: #0d1117; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="160"/>
  <rect class="border" x="0.5" y="0.5" width="1199" height="159"/>

  <!-- Magnifying glass icon (examining multi-factor decisions) -->
  <g transform="translate(60, 38)">
    <!-- lens -->
    <circle cx="42" cy="42" r="36" class="icon-stroke"/>
    <!-- factor dots inside lens -->
    <circle cx="27" cy="34" r="3.5" class="factor-dot"/>
    <circle cx="42" cy="25" r="3.5" class="factor-dot"/>
    <circle cx="57" cy="35" r="3.5" class="factor-dot"/>
    <circle cx="32" cy="52" r="3.5" class="factor-dot"/>
    <circle cx="50" cy="55" r="3.5" class="factor-dot"/>
    <!-- handle -->
    <line x1="69" y1="69" x2="92" y2="92" class="icon-stroke" stroke-width="8"/>
  </g>

  <!-- Wordmark -->
  <text x="180" y="98" class="title">FACET</text>

  <!-- Vertical separator -->
  <line class="sep" x1="370" y1="50" x2="370" y2="110"/>

  <!-- Tagline (single row) -->
  <text x="392" y="96" class="tagline">Measuring Attribution Faithfulness in Multi-Factor LLM Reasoning</text>
</svg>
